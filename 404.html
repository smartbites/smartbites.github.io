<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=/" />
    <script>
      (function () {
        const path = window.location.pathname + window.location.search + window.location.hash;
        sessionStorage.setItem('redirect', path);
        window.location.replace('/');
      })();
    </script>
  </head>
  <body></body>
</html>
